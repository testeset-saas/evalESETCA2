<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Técnico ESET Profesional</title>
    <style>
        :root { --eset-blue: #00a1df; --eset-dark: #121212; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f7; margin: 0; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 40px; }
        .header { background: var(--eset-dark); color: white; padding: 30px; text-align: center; border-bottom: 4px solid var(--eset-blue); margin-bottom: 20px; }
        .sticky-score { position: sticky; top: 0; display: none; background: var(--eset-blue); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.3rem; z-index: 1000; }
        .content { padding: 0 30px; }
        .question-card { background: #fff; border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 25px; border-radius: 8px; }
        .question-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #333; display: block; }
        .option { display: block; padding: 12px; margin: 8px 0; border: 1px solid #eee; border-radius: 6px; cursor: pointer; }
        .option:hover { background: #f9f9f9; border-color: var(--eset-blue); }
        .btn-submit { display: block; width: calc(100% - 60px); margin: 20px 30px; padding: 20px; background: var(--eset-blue); color: white; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .card-correct { border-left: 8px solid var(--success) !important; background: #f4fff7 !important; }
        .card-incorrect { border-left: 8px solid var(--danger) !important; background: #fff4f4 !important; }
        .ans-label { display: none; color: var(--success); font-weight: bold; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div id="scoreBar" class="sticky-score"></div>

<div class="wrapper">
    <div class="header">
        <h1>Evaluación de Ingeniería ESET</h1>
        <p>Nivel Profesional: Detección y Respuesta</p>
    </div>

    <div id="quizContainer" class="content">
        </div>

    <button type="button" class="btn-submit" onclick="evaluateQuiz()">Finalizar y Validar</button>
</div>

<script>
    // Base de datos de preguntas
    const db = [
        { q: "¿Cómo define ESET las 'Detecciones de ADN'?", a: "b", opts: ["Biometría de usuario", "Modelos que identifican propiedades de código malicioso y variantes", "Base de datos de firmas estáticas", "Escaneo de sectores MBR"] },
        { q: "¿Cuál es el rol de ESET Augur?", a: "c", opts: ["Desinfección crítica", "Comunicación cifrada", "Motor de Machine Learning basado en redes neuronales", "Agente de actualización"] },
        { q: "La 'Exploración de memoria avanzada' actúa cuando:", a: "a", opts: ["El malware se desempaqueta en RAM para evitar detección inicial", "Hay saturación de procesos", "Se analizan discos externos", "El equipo hiberna"] },
        { q: "¿Qué diferencia a la 'Protección contra ataques de red'?", a: "d", opts: ["Solo analiza servidores de correo", "Requiere licencia Enterprise", "Bloquea puertos USB", "Analiza vulnerabilidades de protocolos IDS/IPS"] },
        { q: "¿Qué busca malware en áreas como la memoria Flash?", a: "c", opts: ["HIPS Avanzado", "Botnet Protection", "Exploración de UEFI", "WMI Scanner"] },
        { q: "¿Cuál es la función operativa de LiveGuard Advanced?", a: "b", opts: ["Visualización de logs", "Sandboxing en la nube para muestras desconocidas", "Filtrado web", "Sustituir motor local"] },
        { q: "El 'Exploit Blocker' supervisa prioritariamente:", a: "a", opts: ["Navegadores, PDFs y Java", "Archivos .zip de correo", "Cámaras web", "Comunicaciones TLS 1.3"] },
        { q: "¿Qué capacidad diferencia a ESET Inspect (XDR)?", a: "c", opts: ["Updates de Windows", "Escritorio remoto", "Visibilidad forense y respuesta ante incidentes", "MDM para iOS"] },
        { q: "La protección contra ataques de fuerza bruta protege:", a: "b", opts: ["Passwords del navegador", "Protocolos RDP y SMB", "Ataques DDoS", "Consola física"] },
        { q: "¿Cómo opera el 'Ransomware Shield'?", a: "d", opts: ["Cifrado preventivo", "Escaneo de .exe únicamente", "Backup automático", "Evaluación de procesos por comportamiento"] },
        { q: "¿Qué implica la 'Tecnología Multigeneracional'?", a: "a", opts: ["Combinación de firmas, ML y heurística", "Compatibilidad con XP", "Gestión multi-vendor", "Updates automáticos"] },
        { q: "¿Cuál es la fuente de ESET LiveGrid®?", a: "b", opts: ["Base de datos Microsoft", "Reputación de millones de sistemas ESET", "Escaneos manuales", "Dark Web"] },
        { q: "¿Qué detecta la protección basada en scripts?", a: "c", opts: ["Macros de Excel", "Instaladores no firmados", "Scripts maliciosos en PowerShell/AMSI", "Uso de Python"] },
        { q: "¿Alcance de Vulnerability & Patch Management?", a: "b", opts: ["Reparar disco duro", "Inventario de brechas y parches centralizados", "Licencias Windows", "Optimizar registro"] },
        { q: "Anti-Phishing basa su efectividad en:", a: "d", opts: ["Bloquear servidores desconocidos", "Analizar remitente", "Desactivar links", "Comparación con base de datos de sitios fraudulentos"] },
        { q: "¿Qué identifica 'Botnet Protection'?", a: "a", opts: ["Comunicación con servidores C&C", "Torrents no autorizados", "Ancho de banda", "Cambios en sistema"] },
        { q: "ESET PROTECT unifica la gestión de:", a: "c", opts: ["Solo LAN", "Bases de datos SQL", "Endpoints, móviles y servidores de correo", "Routers e impresoras"] },
        { q: "Función del Machine Learning Local:", a: "a", opts: ["Clasificar muestras sin internet", "Sugerir desinstalaciones", "Predecir encendido de PC", "Update de interfaz"] },
        { q: "¿Qué control ejerce HIPS?", a: "b", opts: ["Tiempo de internet", "Llamadas al sistema y claves de registro", "Backup de archivos", "Drivers"] },
        { q: "La protección bancaria asegura la sesión mediante:", a: "c", opts: ["Proxy de ESET", "VPN obligatoria", "Navegador seguro con memoria aislada", "Cifrado de tarjeta de red"] },
        { q: "Beneficio crítico de ESET Bridge:", a: "a", opts: ["Caché de instaladores y firmas", "Cámaras IP", "Firewall WAF", "Conexión sin tarjeta de red"] },
        { q: "¿Qué busca el escáner WMI?", a: "b", opts: ["Errores de sintaxis", "Malware oculto en Instrumental de Windows", "Velocidad de Office", "Sincronizar hora"] },
        { q: "Diferenciador de ESET PROTECT Cloud:", a: "d", opts: ["Sin antivirus en endpoint", "Sin agentes", "Seguro ciberataques", "Infraestructura siempre actualizada por ESET"] },
        { q: "¿Cómo trabaja 'Document Protection'?", a: "c", opts: ["Marca de agua", "Bloqueo USB", "Exploración de macros y contenido activo", "Cifrar PDF"] },
        { q: "La 'Protección Multicapa' se fundamenta en:", a: "b", opts: ["3 antivirus", "Análisis en diferentes fases de ejecución", "3 niveles de soporte", "3 nubes"] },
        { q: "¿Qué define a ESET Hub?", a: "a", opts: ["Gestión centralizada de identidad y licencias", "Router físico", "Soporte premium", "Scripts gratuitos"] },
        { q: "Función del escáner de registro:", a: "c", opts: ["Borrar claves viejas", "Desfragmentar", "Buscar malware oculto en claves de registro", "Panel de control"] },
        { q: "Aislamiento de red en Inspect sirve para:", a: "b", opts: ["Cortar luz", "Restringir comunicación excepto con consola ESET", "Borrar historial", "Cambiar IP"] },
        { q: "Integración de MDM en PROTECT:", a: "a", opts: ["Módulo nativo para políticas Android/iOS", "App de terceros", "Solo ver batería", "Servidor físico extra"] },
        { q: "Visión de ESET sobre IA:", a: "c", opts: ["IA reemplaza humanos", "No usa IA", "IA entrenada y validada por expertos humanos", "Solo IA Enterprise"] }
    ];

    const container = document.getElementById('quizContainer');

    // Función para dibujar las preguntas inmediatamente
    function render() {
        let html = "";
        db.forEach((item, i) => {
            html += `<div class="question-card" id="card${i}">
                <span class="question-text">${i + 1}. ${item.q}</span>`;
            
            // Generar opciones A, B, C, D
            item.opts.forEach((opt, idx) => {
                const letra = String.fromCharCode(97 + idx); // a, b, c, d
                html += `
                <label class="option">
                    <input type="radio" name="q${i}" value="${letra}">
                    <strong>${letra.toUpperCase()})</strong> ${opt}
                </label>`;
            });

            html += `<div class="ans-label" id="ans${i}">Respuesta: ${item.a.toUpperCase()}</div></div>`;
        });
        container.innerHTML = html;
    }

    function evaluateQuiz() {
        let score = 0;
        db.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const card = document.getElementById(`card${i}`);
            document.getElementById(`ans${i}`).style.display = "block";
            
            if (selected && selected.value === item.a) {
                score++;
                card.classList.add('card-correct');
            } else {
                card.classList.add('card-incorrect');
            }
        });

        const final = ((score / db.length) * 10).toFixed(1);
        const bar = document.getElementById('scoreBar');
        bar.style.display = "block";
        bar.style.background = final >= 8 ? "#27ae60" : "#e67e22";
        bar.innerHTML = `CALIFICACIÓN: ${final} / 10 | Aciertos: ${score} de ${db.length}`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Ejecutar render inmediatamente
    render();
</script>

</body>
</html>
